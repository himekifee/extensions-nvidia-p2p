name: publish-p2p-installer

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label for the full publish path
        required: true
        default: ubuntu-24.04
        type: string
      publish_namespace:
        description: Base GHCR namespace for custom publish artifacts
        required: true
        default: ghcr.io/himekifee/talos-tinygrad-nvidia-p2p-driver
        type: string
      image_tag:
        description: Optional override for published image tags
        required: false
        type: string
      build_tag:
        description: Optional override for build metadata tag passed into make
        required: false
        type: string

concurrency:
  group: publish-p2p-installer-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  # ── Phase 1: Build all base images locally ──────────────────────────
  # Builds kernel, installer-base, and p2p-pkg without pushing.
  # Images are saved as artifacts so downstream push jobs can retry
  # independently without rebuilding.
  build:
    permissions:
      contents: read
      packages: read
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 300
    env:
      MATRIX_PATH: docs/release-matrix.yaml
      PUBLISH_NAMESPACE: ${{ github.event.inputs.publish_namespace || 'ghcr.io/himekifee/talos-tinygrad-nvidia-p2p-driver' }}
      INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
      INPUT_BUILD_TAG: ${{ github.event.inputs.build_tag || '' }}
    steps:
      - name: gather-system-info
        id: system-info
        uses: kenchan0130/actions-system-info@59699597e84e80085a750998045983daa49274c4
        continue-on-error: true

      - name: print-system-info
        continue-on-error: true
        run: |
          MEMORY_GB=$((${{ steps.system-info.outputs.totalmem }}/1024/1024/1024))

          OUTPUTS=(
            "CPU Core: ${{ steps.system-info.outputs.cpu-core }}"
            "CPU Model: ${{ steps.system-info.outputs.cpu-model }}"
            "Hostname: ${{ steps.system-info.outputs.hostname }}"
            "NodeName: ${NODE_NAME}"
            "Kernel release: ${{ steps.system-info.outputs.kernel-release }}"
            "Kernel version: ${{ steps.system-info.outputs.kernel-version }}"
            "Name: ${{ steps.system-info.outputs.name }}"
            "Platform: ${{ steps.system-info.outputs.platform }}"
            "Release: ${{ steps.system-info.outputs.release }}"
            "Total memory: ${MEMORY_GB} GB"
          )

          for OUTPUT in "${OUTPUTS[@]}"; do
            echo "${OUTPUT}"
          done

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: fetch-full-history
        run: |
          git fetch --prune --tags --unshallow || git fetch --prune --tags

      - name: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: install-python-dependencies
        run: |
          python3 -m pip install --user PyYAML

      - name: set-up-docker-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive-publish-refs
        id: derive
        run: |
          python3 - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          import yaml

          root = Path(".")
          pkgfile = yaml.safe_load((root / "Pkgfile").read_text(encoding="utf-8"))
          matrix = yaml.safe_load((root / os.environ["MATRIX_PATH"]).read_text(encoding="utf-8"))
          misc_vars = yaml.safe_load((root / "misc/vars.yaml").read_text(encoding="utf-8"))
          storage_vars = yaml.safe_load((root / "storage/vars.yaml").read_text(encoding="utf-8"))
          guest_agent_vars = yaml.safe_load((root / "guest-agents/vars.yaml").read_text(encoding="utf-8"))

          talos_version = matrix["targetTalosVersion"].strip()
          driver_version = matrix["nvidia"]["upstreamOpenModuleTag"].strip()
          arch = matrix["arch"].strip()
          publish_namespace = os.environ["PUBLISH_NAMESPACE"].strip().rstrip("/")
          short_sha = subprocess.check_output(
              ["git", "rev-parse", "--short=12", "HEAD"],
              text=True,
          ).strip()
          source_date_epoch = subprocess.check_output(
              ["git", "log", "-1", "--pretty=%ct", "HEAD"],
              text=True,
          ).strip()

          def sanitize(tag: str) -> str:
              cleaned = re.sub(r"[^0-9A-Za-z._-]+", "-", tag.strip())
              cleaned = re.sub(r"-+", "-", cleaned).strip("-.")
              if not cleaned:
                  raise SystemExit("derived tag was empty after sanitization")
              return cleaned

          release_tag = sanitize(
              os.environ.get("INPUT_IMAGE_TAG", "")
              or f"{talos_version}-nvidia-{driver_version}-g{short_sha}"
          )
          build_tag = sanitize(
              os.environ.get("INPUT_BUILD_TAG", "")
              or f"{talos_version}-g{short_sha}"
          )
          artifact_tag = sanitize(
              f"{release_tag}-run{os.environ['GITHUB_RUN_ID']}-{os.environ['GITHUB_RUN_ATTEMPT']}"
          )

          platform_map = {
              "amd64": "linux/amd64",
              "arm64": "linux/arm64",
          }
          if arch not in platform_map:
              raise SystemExit(f"unsupported release-matrix arch for CI workflow: {arch}")

          extra_extensions = [
              f"ghcr.io/siderolabs/glibc:{misc_vars['GLIBC_VERSION']}",
              f"ghcr.io/siderolabs/binfmt-misc:{talos_version}",
              f"ghcr.io/siderolabs/btrfs:{talos_version}",
              f"ghcr.io/siderolabs/fuse3:{storage_vars['FUSE3_VERSION']}",
              f"ghcr.io/siderolabs/qemu-guest-agent:{guest_agent_vars['QEMU_VERSION']}",
              f"ghcr.io/siderolabs/util-linux-tools:{pkgfile['vars']['UTIL_LINUX_VERSION']}",
          ]

          refs = {
              "ARCH": arch,
              "PLATFORM": platform_map[arch],
              "TALOS_VERSION": talos_version,
              "DRIVER_VERSION": driver_version,
              "SOURCE_DATE_EPOCH": source_date_epoch,
              "RELEASE_TAG": release_tag,
              "ARTIFACT_TAG": artifact_tag,
              "BUILD_TAG": build_tag,
              "CUSTOM_PKG_TAG": artifact_tag,
              "KERNEL_IMAGE": f"{publish_namespace}/kernel:{artifact_tag}",
              "INSTALLER_BASE_IMAGE": f"{publish_namespace}/installer-base:{artifact_tag}",
              "P2P_PKG_IMAGE": f"{publish_namespace}/nvidia-modules-p2p-production-pkg:{artifact_tag}",
              "P2P_SYSEXT_IMAGE": f"{publish_namespace}/nvidia-modules-p2p-production:{artifact_tag}",
              "INSTALLER_IMAGE_REPO": f"{publish_namespace}/nvidia-open-gpu-kernel-modules-p2p-installer",
              "INSTALLER_IMAGE": f"{publish_namespace}/nvidia-open-gpu-kernel-modules-p2p-installer:{release_tag}",
              "EXTRA_SYSTEM_EXTENSION_IMAGES": ",".join(extra_extensions),
          }

          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as stream:
              for key, value in refs.items():
                  stream.write(f"{key}={value}\n")
          PY

      - name: validate-local-inputs
        run: |
          for cmd in base64 curl docker git grep make mktemp modinfo objcopy objdump openssl patch python3 tar xz zstd; do
            command -v "$cmd" >/dev/null
          done

          for path in \
            "$MATRIX_PATH" \
            hack/p2p/build-installer.sh \
            hack/p2p/build-samekey-installer-base.py \
            kernel/kernel/pkg.yaml \
            nvidia-gpu/nvidia-modules-p2p/kernel/production/pkg.yaml \
            nvidia-gpu/nvidia-modules-p2p/pkg/production/pkg.yaml; do
            test -e "$path"
          done

      - name: validate-release-matrix-and-track
        run: |
          bash hack/p2p/check-matrix.sh "$MATRIX_PATH"
          bash hack/p2p/check-patch-apply.sh "$MATRIX_PATH"
          bash hack/p2p/check-userspace-track.sh "$MATRIX_PATH"

      - name: generate-shared-module-signing-key
        run: |
          echo "MODULE_SIG_KEY_PEM_B64=$(bash hack/p2p/generate-module-signing-key.sh)" >> "$GITHUB_ENV"

      - name: build-samekey-kernel
        run: |
          SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" \
          make target-kernel \
            PLATFORM="$PLATFORM" \
            PROGRESS=plain \
            TAG="$BUILD_TAG" \
            TARGET_ARGS="--build-arg=MODULE_SIG_KEY_PEM_B64=${MODULE_SIG_KEY_PEM_B64} --tag=${KERNEL_IMAGE} --load"

      - name: build-samekey-installer-base
        run: |
          SAMEKEY_KERNEL_IMAGE="$KERNEL_IMAGE" \
          OUTPUT_IMAGE="$INSTALLER_BASE_IMAGE" \
          PUSH_OUTPUT=false \
          python3 hack/p2p/build-samekey-installer-base.py
          docker image inspect "$INSTALLER_BASE_IMAGE" >/dev/null

      - name: build-p2p-pkg
        run: |
          SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" \
          make target-nvidia-modules-p2p-production-pkg \
            PLATFORM="$PLATFORM" \
            PROGRESS=plain \
            TAG="$BUILD_TAG" \
            TARGET_ARGS="--build-arg=MODULE_SIG_KEY_PEM_B64=${MODULE_SIG_KEY_PEM_B64} --tag=${P2P_PKG_IMAGE} --load"

      - name: verify-shared-module-signing-key
        run: |
          bash hack/p2p/verify-same-signing-key.sh "$KERNEL_IMAGE" "$P2P_PKG_IMAGE"

      - name: export-build-refs
        run: |
          {
            echo "MATRIX_PATH=${MATRIX_PATH}"
            echo "PUBLISH_NAMESPACE=${PUBLISH_NAMESPACE}"
            echo "ARCH=${ARCH}"
            echo "PLATFORM=${PLATFORM}"
            echo "TALOS_VERSION=${TALOS_VERSION}"
            echo "DRIVER_VERSION=${DRIVER_VERSION}"
            echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "ARTIFACT_TAG=${ARTIFACT_TAG}"
            echo "BUILD_TAG=${BUILD_TAG}"
            echo "CUSTOM_PKG_TAG=${CUSTOM_PKG_TAG}"
            echo "KERNEL_IMAGE=${KERNEL_IMAGE}"
            echo "INSTALLER_BASE_IMAGE=${INSTALLER_BASE_IMAGE}"
            echo "P2P_PKG_IMAGE=${P2P_PKG_IMAGE}"
            echo "P2P_SYSEXT_IMAGE=${P2P_SYSEXT_IMAGE}"
            echo "INSTALLER_IMAGE_REPO=${INSTALLER_IMAGE_REPO}"
            echo "INSTALLER_IMAGE=${INSTALLER_IMAGE}"
            echo "EXTRA_SYSTEM_EXTENSION_IMAGES=${EXTRA_SYSTEM_EXTENSION_IMAGES}"
          } > /tmp/build-refs.env

      - name: save-base-images
        run: |
          mkdir -p /tmp/images
          docker save "$KERNEL_IMAGE" | zstd -T0 -3 > /tmp/images/kernel.tar.zst
          docker save "$INSTALLER_BASE_IMAGE" | zstd -T0 -3 > /tmp/images/installer-base.tar.zst
          docker save "$P2P_PKG_IMAGE" | zstd -T0 -3 > /tmp/images/p2p-pkg.tar.zst

      - name: upload-build-refs
        uses: actions/upload-artifact@v4
        with:
          name: build-refs
          path: /tmp/build-refs.env
          retention-days: 1

      - name: upload-base-images
        uses: actions/upload-artifact@v4
        with:
          name: base-images
          path: /tmp/images/
          retention-days: 1
          compression-level: 0

  # ── Phase 2: Push base images to registry ───────────────────────────
  # Re-runnable independently: downloads saved images from artifacts and
  # pushes them. No rebuild required on transient push failures.
  push-base:
    needs: [build]
    permissions:
      contents: read
      packages: write
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 60
    steps:
      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download-build-refs
        uses: actions/download-artifact@v4
        with:
          name: build-refs

      - name: load-build-refs
        run: |
          cat build-refs.env >> "$GITHUB_ENV"

      - name: download-base-images
        uses: actions/download-artifact@v4
        with:
          name: base-images
          path: /tmp/images/

      - name: load-images
        run: |
          zstd -d -c /tmp/images/kernel.tar.zst | docker load
          zstd -d -c /tmp/images/installer-base.tar.zst | docker load
          zstd -d -c /tmp/images/p2p-pkg.tar.zst | docker load

      - name: push-samekey-kernel
        run: |
          docker push "$KERNEL_IMAGE"

      - name: push-samekey-installer-base
        run: |
          docker push "$INSTALLER_BASE_IMAGE"

      - name: push-p2p-pkg
        run: |
          docker push "$P2P_PKG_IMAGE"

      - name: resolve-base-digests
        run: |
          image_digest() {
            local ref="$1"
            local digest
            digest="$(docker buildx imagetools inspect "$ref" | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
            test -n "$digest"
            printf '%s' "$digest"
          }

          {
            echo "KERNEL_DIGEST=$(image_digest "$KERNEL_IMAGE")"
            echo "INSTALLER_BASE_DIGEST=$(image_digest "$INSTALLER_BASE_IMAGE")"
            echo "P2P_PKG_DIGEST=$(image_digest "$P2P_PKG_IMAGE")"
          } > /tmp/base-digests.env

          cat /tmp/base-digests.env

      - name: upload-base-digests
        uses: actions/upload-artifact@v4
        with:
          name: base-digests
          path: /tmp/base-digests.env
          retention-days: 1

  # ── Phase 3: Build sysext (needs p2p-pkg from registry) ────────────
  build-sysext:
    needs: [push-base]
    permissions:
      contents: read
      packages: read
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 120
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: fetch-full-history
        run: |
          git fetch --prune --tags --unshallow || git fetch --prune --tags

      - name: set-up-docker-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download-build-refs
        uses: actions/download-artifact@v4
        with:
          name: build-refs

      - name: download-base-digests
        uses: actions/download-artifact@v4
        with:
          name: base-digests

      - name: load-build-refs
        run: |
          cat build-refs.env >> "$GITHUB_ENV"
          cat base-digests.env >> "$GITHUB_ENV"

      - name: build-p2p-sysext
        run: |
          SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" \
          make target-nvidia-modules-p2p-production \
            PLATFORM="$PLATFORM" \
            PROGRESS=plain \
            TAG="$BUILD_TAG" \
            PKGS="$CUSTOM_PKG_TAG" \
            PKGS_PREFIX="$PUBLISH_NAMESPACE" \
            P2P_PKG_IMAGE_REF="${P2P_PKG_IMAGE}@${P2P_PKG_DIGEST}" \
            TARGET_ARGS="--build-arg=P2P_PKG_IMAGE_REF=${P2P_PKG_IMAGE}@${P2P_PKG_DIGEST} --tag=${P2P_SYSEXT_IMAGE} --load"

      - name: save-sysext-image
        run: |
          docker save "$P2P_SYSEXT_IMAGE" | zstd -T0 -3 > /tmp/p2p-sysext.tar.zst

      - name: upload-sysext-image
        uses: actions/upload-artifact@v4
        with:
          name: sysext-image
          path: /tmp/p2p-sysext.tar.zst
          retention-days: 1
          compression-level: 0

  # ── Phase 4: Push sysext to registry ────────────────────────────────
  push-sysext:
    needs: [build-sysext]
    permissions:
      contents: read
      packages: write
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 60
    steps:
      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download-build-refs
        uses: actions/download-artifact@v4
        with:
          name: build-refs

      - name: download-base-digests
        uses: actions/download-artifact@v4
        with:
          name: base-digests

      - name: load-build-refs
        run: |
          cat build-refs.env >> "$GITHUB_ENV"
          cat base-digests.env >> "$GITHUB_ENV"

      - name: download-sysext-image
        uses: actions/download-artifact@v4
        with:
          name: sysext-image
          path: /tmp/

      - name: load-and-push-sysext
        run: |
          zstd -d -c /tmp/p2p-sysext.tar.zst | docker load
          docker push "$P2P_SYSEXT_IMAGE"

  # ── Phase 5: Build final installer (needs published digests) ────────
  build-installer:
    needs: [push-base, push-sysext]
    permissions:
      contents: read
      packages: read
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 120
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: fetch-full-history
        run: |
          git fetch --prune --tags --unshallow || git fetch --prune --tags

      - name: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: install-python-dependencies
        run: |
          python3 -m pip install --user PyYAML

      - name: install-system-dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y kmod squashfs-tools

      - name: set-up-docker-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download-build-refs
        uses: actions/download-artifact@v4
        with:
          name: build-refs

      - name: download-base-digests
        uses: actions/download-artifact@v4
        with:
          name: base-digests

      - name: load-build-refs
        run: |
          cat build-refs.env >> "$GITHUB_ENV"
          cat base-digests.env >> "$GITHUB_ENV"

      - name: resolve-published-digests
        run: |
          image_digest() {
            local ref="$1"
            local digest
            digest="$(docker buildx imagetools inspect "$ref" | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
            test -n "$digest"
            printf '%s' "$digest"
          }

          EXPECTED_KERNEL_DIGEST="$KERNEL_DIGEST"
          EXPECTED_INSTALLER_BASE_DIGEST="$INSTALLER_BASE_DIGEST"
          EXPECTED_P2P_PKG_DIGEST="$P2P_PKG_DIGEST"
          KERNEL_DIGEST="$(image_digest "$KERNEL_IMAGE")"
          INSTALLER_BASE_DIGEST="$(image_digest "$INSTALLER_BASE_IMAGE")"
          P2P_PKG_DIGEST="$(image_digest "$P2P_PKG_IMAGE")"
          test "$KERNEL_DIGEST" = "$EXPECTED_KERNEL_DIGEST"
          test "$INSTALLER_BASE_DIGEST" = "$EXPECTED_INSTALLER_BASE_DIGEST"
          test "$P2P_PKG_DIGEST" = "$EXPECTED_P2P_PKG_DIGEST"
          P2P_SYSEXT_DIGEST="$(image_digest "$P2P_SYSEXT_IMAGE")"
          IMAGER_DIGEST="$(image_digest "ghcr.io/siderolabs/imager:${TALOS_VERSION}")"
          {
            echo "KERNEL_DIGEST=$KERNEL_DIGEST"
            echo "INSTALLER_BASE_DIGEST=$INSTALLER_BASE_DIGEST"
            echo "P2P_PKG_DIGEST=$P2P_PKG_DIGEST"
            echo "P2P_SYSEXT_DIGEST=$P2P_SYSEXT_DIGEST"
            echo "IMAGER_DIGEST=$IMAGER_DIGEST"
            echo "IMAGER_IMAGE=ghcr.io/siderolabs/imager:${TALOS_VERSION}@${IMAGER_DIGEST}"
            echo "CUSTOM_SYSEXT_IMAGE=${P2P_SYSEXT_IMAGE}@${P2P_SYSEXT_DIGEST}"
          } >> "$GITHUB_ENV"

      - name: build-final-installer
        run: |
          CUSTOM_SYSEXT_IMAGE="$CUSTOM_SYSEXT_IMAGE" \
          IMAGER_IMAGE="$IMAGER_IMAGE" \
          BASE_INSTALLER_IMAGE="${INSTALLER_BASE_IMAGE}@${INSTALLER_BASE_DIGEST}" \
          SAMEKEY_KERNEL_IMAGE="${KERNEL_IMAGE}@${KERNEL_DIGEST}" \
          P2P_PKG_IMAGE="${P2P_PKG_IMAGE}@${P2P_PKG_DIGEST}" \
          INSTALLER_IMAGE_REPO="$INSTALLER_IMAGE_REPO" \
          INSTALLER_IMAGE_TAG="$RELEASE_TAG" \
          INSTALLER_SOURCE_LABEL="https://github.com/${{ github.repository }}" \
          EXTRA_SYSTEM_EXTENSION_IMAGES="$EXTRA_SYSTEM_EXTENSION_IMAGES" \
          PUSH_INSTALLER=false \
          bash hack/p2p/build-installer.sh "$MATRIX_PATH"

      - name: export-digest-refs
        run: |
          {
            echo "KERNEL_DIGEST=${KERNEL_DIGEST}"
            echo "INSTALLER_BASE_DIGEST=${INSTALLER_BASE_DIGEST}"
            echo "P2P_PKG_DIGEST=${P2P_PKG_DIGEST}"
            echo "P2P_SYSEXT_DIGEST=${P2P_SYSEXT_DIGEST}"
            echo "IMAGER_DIGEST=${IMAGER_DIGEST}"
            echo "IMAGER_IMAGE=${IMAGER_IMAGE}"
            echo "CUSTOM_SYSEXT_IMAGE=${CUSTOM_SYSEXT_IMAGE}"
          } > /tmp/digest-refs.env

      - name: save-installer-image
        run: |
          docker save "$INSTALLER_IMAGE" | zstd -T0 -3 > /tmp/installer.tar.zst

      - name: upload-digest-refs
        uses: actions/upload-artifact@v4
        with:
          name: digest-refs
          path: /tmp/digest-refs.env
          retention-days: 1

      - name: upload-installer-image
        uses: actions/upload-artifact@v4
        with:
          name: installer-image
          path: /tmp/installer.tar.zst
          retention-days: 1
          compression-level: 0

  # ── Phase 6: Push final installer ───────────────────────────────────
  push-installer:
    needs: [build-installer]
    permissions:
      contents: read
      packages: write
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 60
    steps:
      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download-build-refs
        uses: actions/download-artifact@v4
        with:
          name: build-refs

      - name: load-build-refs
        run: |
          cat build-refs.env >> "$GITHUB_ENV"

      - name: download-installer-image
        uses: actions/download-artifact@v4
        with:
          name: installer-image
          path: /tmp/

      - name: load-and-push-installer
        run: |
          zstd -d -c /tmp/installer.tar.zst | docker load
          docker push "$INSTALLER_IMAGE"

      - name: resolve-final-installer-digest
        run: |
          INSTALLER_DIGEST="$(docker buildx imagetools inspect "$INSTALLER_IMAGE" | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
          test -n "$INSTALLER_DIGEST"
          echo "INSTALLER_DIGEST=$INSTALLER_DIGEST" > /tmp/installer-digest.env

      - name: upload-installer-digest
        uses: actions/upload-artifact@v4
        with:
          name: installer-digest
          path: /tmp/installer-digest.env
          retention-days: 1

  # ── Phase 7: Verify and publish summary ─────────────────────────────
  verify:
    needs: [push-installer]
    permissions:
      contents: read
      packages: read
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 30
    steps:
      - name: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: install-system-dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y kmod squashfs-tools

      - name: set-up-docker-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: login-to-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: download-build-refs
        uses: actions/download-artifact@v4
        with:
          name: build-refs

      - name: load-build-refs
        run: |
          cat build-refs.env >> "$GITHUB_ENV"

      - name: download-digest-refs
        uses: actions/download-artifact@v4
        with:
          name: digest-refs

      - name: load-digest-refs
        run: |
          cat digest-refs.env >> "$GITHUB_ENV"

      - name: download-installer-digest
        uses: actions/download-artifact@v4
        with:
          name: installer-digest

      - name: load-installer-digest
        run: |
          cat installer-digest.env >> "$GITHUB_ENV"

      - name: verify-final-installer
        run: |
          set -euo pipefail

          installer_digest_ref="${INSTALLER_IMAGE}@${INSTALLER_DIGEST}"
          installer_pull_ref="${INSTALLER_IMAGE_REPO}"
          kernel_digest_ref="${KERNEL_IMAGE}@${KERNEL_DIGEST}"
          p2p_pkg_digest_ref="${P2P_PKG_IMAGE}@${P2P_PKG_DIGEST}"
          container_id=""
          kernel_container_id=""
          pkg_container_id=""
          verify_dir="$(mktemp -d)"

          cleanup() {
            if [ -n "$container_id" ]; then
              docker rm "$container_id" >/dev/null 2>&1 || true
            fi
            if [ -n "$kernel_container_id" ]; then
              docker rm "$kernel_container_id" >/dev/null 2>&1 || true
            fi
            if [ -n "$pkg_container_id" ]; then
              docker rm "$pkg_container_id" >/dev/null 2>&1 || true
            fi
            rm -rf "$verify_dir"
          }

          extract_initrd_rootfs() {
            local initrd_path="$1"
            local output_path="$2"

            python3 - "$initrd_path" "$output_path" <<'PY'
          import lzma
          import subprocess
          import sys
          from pathlib import Path


          def align(value: int) -> int:
              return (value + 3) & ~3


          initrd_path = Path(sys.argv[1])
          output_path = Path(sys.argv[2])
          data = initrd_path.read_bytes()

          if data.startswith(b"\x28\xb5\x2f\xfd"):
              data = subprocess.run(
                  ["zstd", "-q", "-d", "-c", str(initrd_path)],
                  check=True,
                  stdout=subprocess.PIPE,
              ).stdout
          elif data.startswith(b"\xfd7zXZ\x00"):
              data = lzma.decompress(data)

          offset = 0
          while offset + 110 <= len(data):
              if data[offset:offset + 6] != b"070701":
                  raise SystemExit(f"bad cpio magic at offset {offset}")

              fields = [
                  int(data[offset + 6 + index:offset + 14 + index], 16)
                  for index in range(0, 13 * 8, 8)
              ]
              header_end = offset + 110
              namesize = fields[11]
              filesize = fields[6]
              name = data[header_end:header_end + namesize - 1].decode("utf-8")
              offset = align(header_end + namesize)
              filedata = data[offset:offset + filesize]
              offset = align(offset + filesize)

              if name == "TRAILER!!!":
                  raise SystemExit("rootfs.sqsh not found in UKI initrd")

              if name == "rootfs.sqsh":
                  output_path.write_bytes(filedata)
                  break
          else:
              raise SystemExit("TRAILER!!! not found in UKI initrd")
          PY
          }

          trap cleanup EXIT

          printf 'pulling installer image by digest %s\n' "$installer_digest_ref"
          docker pull "${installer_pull_ref}@${INSTALLER_DIGEST}" >/dev/null
          printf 'pulling kernel image by digest %s\n' "$kernel_digest_ref"
          docker pull "$kernel_digest_ref" >/dev/null
          printf 'pulling P2P pkg image by digest %s\n' "$p2p_pkg_digest_ref"
          docker pull "$p2p_pkg_digest_ref" >/dev/null

          kernel_container_id="$(docker create "$kernel_digest_ref" sh)"
          docker cp "$kernel_container_id:/boot/vmlinuz" "$verify_dir/kernel-vmlinuz"
          docker rm "$kernel_container_id" >/dev/null
          kernel_container_id=""

          container_id="$(docker create "$installer_digest_ref")"
          docker cp "$container_id:/usr/install/${ARCH}/vmlinuz" "$verify_dir/vmlinuz"
          docker cp "$container_id:/usr/install/${ARCH}/initramfs.xz" "$verify_dir/initramfs.xz"
          docker cp "$container_id:/usr/install/${ARCH}/vmlinuz.efi" "$verify_dir/vmlinuz.efi"
          docker rm "$container_id" >/dev/null
          container_id=""

          chmod 644 "$verify_dir/vmlinuz.efi"
          objcopy --dump-section .linux="$verify_dir/uki-linux" "$verify_dir/vmlinuz.efi"
          objcopy --dump-section .initrd="$verify_dir/initrd.bin" "$verify_dir/vmlinuz.efi"

          if ! cmp -s "$verify_dir/vmlinuz" "$verify_dir/uki-linux"; then
            echo "error: final installer vmlinuz differs from final UKI .linux" >&2
            exit 1
          fi

          if ! cmp -s "$verify_dir/kernel-vmlinuz" "$verify_dir/uki-linux"; then
            echo "error: final UKI .linux differs from the same-key kernel image" >&2
            exit 1
          fi

          extract_initrd_rootfs "$verify_dir/initrd.bin" "$verify_dir/rootfs.sqsh"
          extract_initrd_rootfs "$verify_dir/initramfs.xz" "$verify_dir/initramfs-rootfs.sqsh"
          if ! cmp -s "$verify_dir/rootfs.sqsh" "$verify_dir/initramfs-rootfs.sqsh"; then
            echo "error: final installer initramfs.xz rootfs differs from final UKI .initrd rootfs" >&2
            exit 1
          fi

          if ! unsquashfs -cat "$verify_dir/rootfs.sqsh" usr/lib/systemd/network/99-default.link >/dev/null 2>&1; then
            echo "error: final UKI rootfs.sqsh is missing usr/lib/systemd/network/99-default.link" >&2
            exit 1
          fi

          unsquashfs -no-xattrs -f -d "$verify_dir/rootfs-modules" "$verify_dir/rootfs.sqsh" usr/lib/modules >/dev/null
          ahci_path="$(find "$verify_dir/rootfs-modules" -name 'ahci.ko' -print -quit)"
          if [ -z "$ahci_path" ]; then
            echo "error: could not find ahci.ko in final UKI rootfs.sqsh" >&2
            exit 1
          fi

          pkg_container_id="$(docker create "$p2p_pkg_digest_ref" sh)"
          docker cp "$pkg_container_id:/usr/lib/modules" "$verify_dir/p2p-pkg-modules"
          docker rm "$pkg_container_id" >/dev/null
          pkg_container_id=""

          nvidia_path="$(find "$verify_dir/p2p-pkg-modules" -name 'nvidia.ko' -print -quit)"
          if [ -z "$nvidia_path" ]; then
            echo "error: could not find nvidia.ko in '$p2p_pkg_digest_ref'" >&2
            exit 1
          fi

          ahci_signer="$(modinfo -F signer "$ahci_path")"
          ahci_sig_key="$(modinfo -F sig_key "$ahci_path")"
          nvidia_signer="$(modinfo -F signer "$nvidia_path")"
          nvidia_sig_key="$(modinfo -F sig_key "$nvidia_path")"

          printf 'final rootfs ahci signer: %s\n' "$ahci_signer"
          printf 'final rootfs ahci sig_key: %s\n' "$ahci_sig_key"
          printf 'p2p pkg nvidia signer: %s\n' "$nvidia_signer"
          printf 'p2p pkg nvidia sig_key: %s\n' "$nvidia_sig_key"

          if [ -z "$ahci_sig_key" ] || [ -z "$nvidia_sig_key" ]; then
            echo "error: missing module signing key metadata in final rootfs or P2P pkg" >&2
            exit 1
          fi

          if [ "$ahci_sig_key" != "$nvidia_sig_key" ]; then
            echo "error: final rootfs ahci.ko and P2P pkg nvidia.ko were signed by different keys" >&2
            exit 1
          fi

          extension_names="$(python3 - "$verify_dir/initrd.bin" <<'PY'
          import lzma
          import re
          import subprocess
          import sys
          from pathlib import Path

          initrd_path = Path(sys.argv[1])
          data = initrd_path.read_bytes()

          if data.startswith(b"\x28\xb5\x2f\xfd"):
              raw = subprocess.run(
                  ["zstd", "-q", "-d", "-c", str(initrd_path)],
                  check=True,
                  stdout=subprocess.PIPE,
              ).stdout
          elif data.startswith(b"\xfd7zXZ\x00"):
              raw = lzma.decompress(data)
          else:
              raw = data

          text = raw.decode("utf-8", errors="ignore")
          pattern = re.compile(
              r"name: (nvidia-modules-p2p-production|nvidia-container-toolkit-production|nvidia-open-gpu-kernel-modules-production)"
          )

          for match in pattern.finditer(text):
              print(match.group(0))
          PY
          )"

          printf '%s\n' "$extension_names" | grep -qF "name: nvidia-modules-p2p-production" \
            || { echo "error: custom P2P NVIDIA sysext is missing from the installer initrd" >&2; exit 1; }
          printf '%s\n' "$extension_names" | grep -qF "name: nvidia-container-toolkit-production" \
            || { echo "error: NVIDIA userspace toolkit sysext is missing from the installer initrd" >&2; exit 1; }

          if printf '%s\n' "$extension_names" | grep -qF "name: nvidia-open-gpu-kernel-modules-production"; then
            echo "error: official nvidia-open-gpu-kernel-modules-production was included alongside the custom P2P sysext" >&2
            exit 1
          fi

          printf 'verified installer image: %s\n' "$installer_digest_ref"
          printf 'verified installer vmlinuz matches UKI .linux\n'
          printf 'verified final UKI .linux matches same-key kernel image\n'
          printf 'verified final installer initramfs.xz rootfs matches UKI .initrd rootfs\n'
          printf 'verified final UKI rootfs contains usr/lib/systemd/network/99-default.link\n'
          printf 'verified final rootfs and P2P pkg shared signing key: %s\n' "$ahci_sig_key"
          printf 'verified included extensions:\n%s\n' "$extension_names"
          printf 'verified excluded extension: nvidia-open-gpu-kernel-modules-production\n'

      - name: publish-summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Published P2P artifacts

          - kernel image: `${KERNEL_IMAGE}@${KERNEL_DIGEST}`
          - installer-base image: `${INSTALLER_BASE_IMAGE}@${INSTALLER_BASE_DIGEST}`
          - nvidia-modules-p2p-production-pkg: `${P2P_PKG_IMAGE}@${P2P_PKG_DIGEST}`
          - nvidia-modules-p2p-production: `${P2P_SYSEXT_IMAGE}@${P2P_SYSEXT_DIGEST}`
          - Talos imager: `${IMAGER_IMAGE}`
          - final installer image: `${INSTALLER_IMAGE}@${INSTALLER_DIGEST}`

          Build tag: `${BUILD_TAG}`
          Publish tag: `${RELEASE_TAG}`
          Extra official extensions: `${EXTRA_SYSTEM_EXTENSION_IMAGES}`
          EOF
